    <table>
      <div class="forms">

        <tr>
          <td>
            <label>
              <div class="idpw">

              </div>
              <input type="text" name="id" placeholder="ユーザーIDを入力">
            </label>
          </td>
        </tr> 
        <tr>
          <td>
            <label>
              <div class="idpw">パスワード<br>

          </td>
        </tr>
      </div>
      <tr>
        <td colspan="2">
          <span class="login">
            <div class="imgb">
              <button type="submit" name="login" class="image-button">

              </button>
          </span>

          <span class="reset">
            <button type="submit" name="login" class="image-button">
              <img src="images/resetbutton.png" width="150" alt="resetto リセット">
            </button>
          </div>
          </span>

          <br>
          </br>
          <a href="newRegister.jsp">新規登録はこちら</a>

      </tr>
    </table>
