<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <title>一覧 | kakemi</title>
    <link rel="stylesheet" type="text/css" href="css/list.css">
</head>

<body>
    <div id="bar">

    </div>



    <!-- タブ -->
    <div class="tabs">
        <button class="tab active" onclick="showTab(event, 'income')">収入</button>
        <button class="tab" onclick="showTab(event, 'expense')">支出</button>
        <button class="tab" onclick="showTab(event, 'save')">我慢</button>
    </div>

    <!-- タブの中身　-->
    <div id="income" class="content active">
        <div class="calender">
            <input type="month" name="calendar">
        </div>

        <c:forEach var="entry" items="${categoryMap}" varStatus="st">

            <div class="card">

                <div class="theader" onclick="toggleContent('cat${st.index}', this)">

                    <span>
                        ${entry.key} の支出合計
                    </span>

                    <span class="amount">
                        ¥${categoryTotalMap[entry.key]}
                    </span>

                    <span class="arrow">▼</span>

                </div>

                <div id="cat${st.index}" class="detail" style="display:none;">

                    <c:forEach var="e" items="${entry.value}">

                        <form method="post" action="ListServlet">


                            <input type="checkbox" name="deleteIds" value="${e.id}">

                            <input type="hidden" name="id" value="${e.id}">

                            <input type="date" name="useDate" value="${e.useDate}">

                            <select name="category">
                                <c:forEach var="c" items="${categoryList}">
                                    <option value="${c.id}" <c:if test="${c.id == e.category}">selected</c:if>>
                                        ${c.cname}</option>
                                </c:forEach>
                            </select>
                            <select name="tag">
                                <c:forEach var="t" items="${tagList}">
                                    <option value="${t.id}" <c:if test="${t.id == e.tag}">selected</c:if>>
                                        ${t.tname}</option>
                                </c:forEach>
                            </select>
                            <select name="situation">
                                <c:forEach var="s" items="${situationList}">
                                    <option value="${s.id}" <c:if test="${s.id == e.situation}">selected</c:if>>
                                        ${s.sname}</option>
                                </c:forEach>
                            </select>
                            <select name="emotion" class="emo">
                                <c:forEach var="em" items="${emotionList}">
                                    <option value="${em.id}" <c:if test="${em.id == e.situation}">selected
                                        </c:if>>
                                        ${em.ename}</option>
                                </c:forEach>
                            </select>
                            <input type="text" name="amoung" value="${e.amoung}">

                    </c:forEach> <br><input type="submit" name="submit" value="編集"> <input type="submit" name="submit"
                        value="削除">

                    </form>
                </div>



            </div>

            <div class="card">

                <div class="cheader" onclick="toggleContent('cat${st.index}', this)">

                    <span>
                        <select name="category" id="category">
                            <option value="1">食費</option>
                            <option value="2">交通費</option>
                            <option value="3">娯楽費</option>
                        </select> の支出合計
                    </span>

                    <span class="amount">
                        ¥${categoryTotalMap[entry.key]}
                    </span>

                    <span class="arrow">▼</span>

                </div>

                <div id="cat${st.index}" class="detail" style="display:none;">

                    <c:forEach var="e" items="${entry.value}">

                        <form method="post" action="ListServlet">


                            <input type="checkbox" name="deleteIds" value="${e.id}">

                            <input type="hidden" name="id" value="${e.id}">

                            <input type="date" name="useDate" value="${e.useDate}">

                            <select name="category">
                                <c:forEach var="c" items="${categoryList}">
                                    <option value="${c.id}" <c:if test="${c.id == e.category}">selected</c:if>>
                                        ${c.cname}</option>
                                </c:forEach>
                            </select>
                            <select name="tag">
                                <c:forEach var="t" items="${tagList}">
                                    <option value="${t.id}" <c:if test="${t.id == e.tag}">selected</c:if>>
                                        ${t.tname}</option>
                                </c:forEach>
                            </select>
                            <select name="situation">
                                <c:forEach var="s" items="${situationList}">
                                    <option value="${s.id}" <c:if test="${s.id == e.situation}">selected</c:if>>
                                        ${s.sname}</option>
                                </c:forEach>
                            </select>
                            <select name="emotion" class="emo">
                                <c:forEach var="em" items="${emotionList}">
                                    <option value="${em.id}" <c:if test="${em.id == e.situation}">selected
                                        </c:if>>
                                        ${em.ename}</option>
                                </c:forEach>
                            </select>
                            <input type="text" name="amoung" value="${e.amoung}">

                    </c:forEach> <br><input type="submit" name="submit" value="編集"> <input type="submit" name="submit"
                        value="削除">

                    </form>
                </div>
            </div>



            <div id="expense" class="content">
                支出
            </div>

            <div id="save" class="content">
                我慢
            </div>


</body>

        <nav class="nav-bar">

<script>
    function showTab(event, id) {
        // 全部非表示
        document.querySelectorAll(".content").forEach(el => {
            el.classList.remove("active");
        });

        // タブの色リセット
        document.querySelectorAll(".tab").forEach(tab => {
            tab.classList.remove("active");
        });

        // 押したやつ表示
        document.getElementById(id).classList.add("active");
        event.currentTarget.classList.add("active");
    }

    //開閉トグル▲▼用

    function toggleContent(id, theader) {

        const detail =
            document.getElementById(id);

        const arrow =
            header.querySelector(".arrow");

        if (detail.style.display === "none") {

            detail.style.display = "block";
            arrow.textContent = "▲";

        } else {

            detail.style.display = "none";
            arrow.textContent = "▼";

        }
    }
